version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: antigravity_db
    restart: always
    environment:
      POSTGRES_USER: antigravity
      POSTGRES_PASSWORD: antigravity_password
      POSTGRES_DB: antigravity_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: antigravity_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: antigravity_qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
